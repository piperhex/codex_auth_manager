name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.result }}
    steps:
      - name: Create or find release
        id: release
        uses: actions/github-script@v9
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          RELEASE_NAME: "Codex Auth Manager ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          PRERELEASE: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.TAG_NAME;
            const boilerplate = "Windows and macOS installers are attached below.";

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              if (!release.body?.trim() || release.body.trim() === boilerplate) {
                const { data: notes } = await github.rest.repos.generateReleaseNotes({
                  owner,
                  repo,
                  tag_name: tag,
                });
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  body: `${boilerplate}\n\n${notes.body}`,
                });
                core.info(`Generated release notes for existing release ${release.id}.`);
              }
              core.info(`Using existing release ${release.id} for ${tag}.`);
              return release.id.toString();
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: process.env.RELEASE_NAME,
              body: boilerplate,
              draft: false,
              prerelease: process.env.PRERELEASE === "true",
              generate_release_notes: true,
            });
            core.info(`Created release ${release.id} for ${tag}.`);
            return release.id.toString();

  release:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macos-x86_64
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - name: windows-x86_64
            platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.name, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          args: ${{ matrix.args }}
