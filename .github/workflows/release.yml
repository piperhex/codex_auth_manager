name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.result }}
    steps:
      - name: Create or find release
        id: release
        uses: actions/github-script@v9
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          RELEASE_NAME: "Codex Switch ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          PRERELEASE: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.TAG_NAME;
            const boilerplate = "Windows, macOS, Linux, Android, and iOS build artifacts are attached below.";

            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              const update = {};
              if (release.name !== process.env.RELEASE_NAME) {
                update.name = process.env.RELEASE_NAME;
              }
              if (!release.body?.trim() || release.body.trim() === boilerplate) {
                const { data: notes } = await github.rest.repos.generateReleaseNotes({
                  owner,
                  repo,
                  tag_name: tag,
                });
                update.body = `${boilerplate}\n\n${notes.body}`;
              }
              if (Object.keys(update).length > 0) {
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  ...update,
                });
                core.info(`Updated existing release ${release.id}.`);
              }
              core.info(`Using existing release ${release.id} for ${tag}.`);
              return release.id.toString();
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: process.env.RELEASE_NAME,
              body: boilerplate,
              draft: true,
              prerelease: process.env.PRERELEASE === "true",
              generate_release_notes: true,
            });
            core.info(`Created draft release ${release.id} for ${tag}.`);
            return release.id.toString();

  release:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - name: macos-x86_64
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - name: ubuntu-x86_64
            platform: ubuntu-22.04
            args: ""
            rustTargets: ""
          - name: windows-x86_64
            platform: windows-latest
            args: ""
            rustTargets: ""
            msvcArch: "amd64"
          - name: windows-aarch64
            platform: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            rustTargets: "aarch64-pc-windows-msvc"
            msvcArch: "amd64_arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux build dependencies
        if: startsWith(matrix.name, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Configure MSVC
        if: startsWith(matrix.name, 'windows')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvcArch }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true

  native-android:
    name: Build Android APK
    needs: create-release
    runs-on: ubuntu-latest
    env:
      # The root workspace uses a different React version, so npm keeps Expo
      # under apps/native. Gradle's bundling subprocess needs that lookup path.
      NODE_PATH: ${{ github.workspace }}/apps/native/node_modules
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail

          ndk_version="$(sed -n 's/^ndkVersion = "\([^"]*\)"/\1/p' apps/native/node_modules/react-native/gradle/libs.versions.toml)"
          if [[ -z "$ndk_version" ]]; then
            echo "::error::Unable to determine the React Native NDK version."
            exit 1
          fi

          android_sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          sdkmanager="$android_sdk_root/cmdline-tools/latest/bin/sdkmanager"
          if [[ -z "$android_sdk_root" || ! -x "$sdkmanager" ]]; then
            echo "::error::Android SDK command-line tools are unavailable."
            exit 1
          fi

          for attempt in 1 2 3; do
            if "$sdkmanager" "ndk;$ndk_version" \
              && [[ -f "$android_sdk_root/ndk/$ndk_version/source.properties" ]]; then
              exit 0
            fi

            echo "::warning::NDK $ndk_version installation failed (attempt $attempt of 3)."
            rm -rf "$android_sdk_root/ndk/$ndk_version" "$android_sdk_root/.temp"
            if [[ "$attempt" -lt 3 ]]; then
              sleep $((attempt * 10))
            fi
          done

          echo "::error::Failed to install NDK $ndk_version after 3 attempts."
          exit 1

      - name: Type-check native app
        run: npm run check -w @codex-switch/native

      - name: Generate Android project
        working-directory: apps/native
        run: npm run prebuild:android

      - name: Build release APK
        working-directory: apps/native
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Prepare APK asset
        run: cp apps/native/android/app/build/outputs/apk/release/app-release.apk apps/native/CodexSwitch-android.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexSwitch-android-apk
          path: apps/native/CodexSwitch-android.apk
          if-no-files-found: error

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: apps/native/CodexSwitch-android.apk

  native-ios:
    name: Build iOS app
    needs: create-release
    # React Native 0.79's fmt pod is not compatible with Xcode 26 yet.
    runs-on: macos-15
    env:
      NODE_PATH: ${{ github.workspace }}/apps/native/node_modules
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check native app
        run: npm run check -w @codex-switch/native

      - name: Generate iOS project
        working-directory: apps/native
        run: npm run prebuild:ios

      - name: Install iOS Pods
        working-directory: apps/native/ios
        run: pod install

      - name: Build unsigned iOS Release app
        working-directory: apps/native
        run: >-
          xcodebuild -workspace ios/CodexSwitch.xcworkspace -scheme CodexSwitch
          -configuration Release -sdk iphoneos -derivedDataPath build
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package iOS app
        working-directory: apps/native
        run: >-
          ditto -c -k --sequesterRsrc --keepParent
          build/Build/Products/Release-iphoneos/CodexSwitch.app
          CodexSwitch-ios-unsigned.app.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexSwitch-ios-unsigned-app
          path: apps/native/CodexSwitch-ios-unsigned.app.zip
          if-no-files-found: error

      - name: Upload iOS build to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: apps/native/CodexSwitch-ios-unsigned.app.zip

  publish-release:
    name: Publish GitHub Release
    needs:
      - create-release
      - release
      - native-android
      - native-ios
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const { data: release } = await github.rest.repos.getRelease({
              owner,
              repo,
              release_id: releaseId,
            });

            if (!release.draft) {
              core.info(`Release ${releaseId} is already published.`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              draft: false,
            });
            core.info(`Published release ${releaseId}.`);
