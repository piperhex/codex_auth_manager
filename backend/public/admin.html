<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Switch Admin</title>
  <style>
    :root { color: #17211b; background: #f3f5f1; font-family: Inter, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    header { height: 62px; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; color: #eff7ef; background: #17251d; }
    header b { font-size: 15px; }
    main { width: min(1120px, calc(100% - 40px)); margin: 28px auto 60px; display: grid; gap: 18px; }
    section { border: 1px solid #dfe5df; border-radius: 8px; background: #fbfcfa; box-shadow: 0 5px 18px rgba(24,45,31,.035); }
    .panel { padding: 20px; }
    h1, h2 { margin: 0; font-size: 20px; }
    h2 { font-size: 15px; margin-bottom: 14px; }
    .muted { color: #718078; font-size: 12px; }
    form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    label { display: grid; gap: 6px; color: #5d6a62; font-size: 11px; font-weight: 700; }
    input, select { height: 38px; min-width: 220px; border: 1px solid #d7e0d8; border-radius: 7px; padding: 0 10px; background: white; }
    button { height: 38px; border: 0; border-radius: 7px; padding: 0 14px; color: white; background: #077809; font-weight: 700; cursor: pointer; }
    button.secondary { color: #33433a; border: 1px solid #d7e0d8; background: white; }
    button:disabled { opacity: .55; cursor: default; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 10px 12px; border-top: 1px solid #e7ece7; text-align: left; }
    th { color: #5d6a62; background: #f6f8f5; }
    .actions { display: flex; gap: 8px; }
    .toast { position: fixed; right: 22px; bottom: 22px; max-width: 420px; padding: 11px 14px; border: 1px solid #c2d6c7; border-radius: 8px; color: #244c35; background: rgba(247,252,247,.96); box-shadow: 0 14px 35px rgba(18,41,26,.15); font-size: 12px; }
  </style>
</head>
<body>
  <header><b>Codex Switch Admin</b><span class="muted" id="session">Signed out</span></header>
  <main>
    <section class="panel">
      <h1>Admin</h1>
      <p class="muted">The first registered user becomes an administrator.</p>
      <form id="login-form">
        <label>Email<input id="login-email" type="email" autocomplete="email" required></label>
        <label>Password<input id="login-password" type="password" autocomplete="current-password" required></label>
        <button type="submit">Sign in</button>
        <button type="button" class="secondary" id="register-first">Register first user</button>
        <button type="button" class="secondary" id="sign-out" disabled>Sign out</button>
      </form>
    </section>
    <section class="panel">
      <h2>Create user</h2>
      <form id="create-form">
        <label>Email<input id="create-email" type="email" required></label>
        <label>Password<input id="create-password" type="password" minlength="8" required></label>
        <label>Role<select id="create-role"><option value="user">user</option><option value="admin">admin</option></select></label>
        <button type="submit">Create</button>
      </form>
    </section>
    <section>
      <table>
        <thead><tr><th>Email</th><th>Role</th><th>Status</th><th>Last login</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody id="users"></tbody>
      </table>
    </section>
  </main>
  <div class="toast" id="toast" hidden></div>
  <script>
    let accessToken = '';

    const byId = (id) => document.getElementById(id);
    const setText = (node, text) => {
      node.textContent = text == null ? '' : String(text);
      return node;
    };
    const appendTextCell = (row, text) => {
      row.appendChild(setText(document.createElement('td'), text));
    };
    const toast = (message) => {
      const node = byId('toast');
      setText(node, message);
      node.hidden = false;
      setTimeout(() => { node.hidden = true; }, 3200);
    };
    const api = async (url, options = {}) => {
      const response = await fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(accessToken ? { Authorization: `Bearer ${accessToken}` } : {}),
          ...(options.headers || {}),
        },
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.message || response.statusText);
      return data;
    };
    const setSession = (email) => {
      setText(byId('session'), email ? `Signed in: ${email}` : 'Signed out');
      byId('sign-out').disabled = !email;
    };
    const createActionButton = (label, action, user) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'secondary';
      button.dataset.action = action;
      button.dataset.id = user.id;
      button.dataset.disabled = String(user.disabled);
      button.dataset.role = user.role;
      setText(button, label);
      return button;
    };
    const loadUsers = async () => {
      if (!accessToken) return;
      const users = await api('/admin/api/users');
      const tableBody = byId('users');
      tableBody.replaceChildren();
      for (const user of users) {
        const row = document.createElement('tr');
        appendTextCell(row, user.email);
        appendTextCell(row, user.role);
        appendTextCell(row, user.disabled ? 'Disabled' : 'Active');
        appendTextCell(row, user.lastLoginAt ? new Date(user.lastLoginAt).toLocaleString() : '-');
        appendTextCell(row, user.createdAt ? new Date(user.createdAt).toLocaleString() : '-');

        const actionsCell = document.createElement('td');
        const actions = document.createElement('div');
        actions.className = 'actions';
        actions.appendChild(createActionButton(user.disabled ? 'Enable' : 'Disable', 'toggle', user));
        actions.appendChild(createActionButton(user.role === 'admin' ? 'Set user' : 'Set admin', 'role', user));
        actionsCell.appendChild(actions);
        row.appendChild(actionsCell);
        tableBody.appendChild(row);
      }
    };
    const handleAuthSuccess = async (email, data) => {
      accessToken = data.accessToken;
      setSession(email);
      toast('Signed in');
      await loadUsers();
    };

    byId('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        const email = byId('login-email').value;
        const data = await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password: byId('login-password').value }),
        });
        await handleAuthSuccess(email, data);
      } catch (error) {
        toast(error.message);
      }
    });
    byId('register-first').addEventListener('click', async () => {
      try {
        const email = byId('login-email').value;
        const data = await api('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ email, password: byId('login-password').value }),
        });
        await handleAuthSuccess(email, data);
      } catch (error) {
        toast(error.message);
      }
    });
    byId('sign-out').addEventListener('click', () => {
      accessToken = '';
      setSession('');
      byId('users').replaceChildren();
      toast('Signed out');
    });
    byId('create-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      try {
        await api('/admin/api/users', {
          method: 'POST',
          body: JSON.stringify({
            email: byId('create-email').value,
            password: byId('create-password').value,
            role: byId('create-role').value,
          }),
        });
        event.target.reset();
        toast('User created');
        await loadUsers();
      } catch (error) {
        toast(error.message);
      }
    });
    byId('users').addEventListener('click', async (event) => {
      const button = event.target.closest('button');
      if (!button) return;
      try {
        const body = button.dataset.action === 'toggle'
          ? { disabled: button.dataset.disabled !== 'true' }
          : { role: button.dataset.role === 'admin' ? 'user' : 'admin' };
        await api(`/admin/api/users/${button.dataset.id}`, { method: 'PATCH', body: JSON.stringify(body) });
        await loadUsers();
      } catch (error) {
        toast(error.message);
      }
    });
  </script>
</body>
</html>
